<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Vault</title>

<!-- Ruffle (UNPKG CDN) -->
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
:root {
  --bg: #0b0f1a;
  --panel: rgba(255,255,255,0.05);
  --accent: #4da3ff;
  --text: #ffffff;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #111a2e, #05070d);
  color: var(--text);
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  height: 100vh;
  background: var(--panel);
  backdrop-filter: blur(20px);
  padding: 20px;
  box-sizing: border-box;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.sidebar h1 {
  font-size: 20px;
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.sidebar button:hover {
  background: var(--accent);
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

/* Top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.search {
  width: 300px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* Game grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  background: var(--panel);
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
  transition: 0.2s;
  backdrop-filter: blur(15px);
}

.card:hover {
  transform: scale(1.05);
  background: rgba(77,163,255,0.2);
}

.card h3 {
  margin: 0;
  font-size: 16px;
}

/* Player modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  width: 900px;
  height: 600px;
  background: black;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.close-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  border: none;
  color: white;
  padding: 8px 10px;
  cursor: pointer;
  border-radius: 6px;
}

.fullscreen-btn {
  position: absolute;
  top: 10px;
  right: 60px;
  background: var(--accent);
  border: none;
  color: white;
  padding: 8px 10px;
  cursor: pointer;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h1>🔐 The Vault</h1>
  <button onclick="filterGames('all')">All Games</button>
  <button onclick="filterGames('action')">Action</button>
  <button onclick="filterGames('arcade')">Arcade</button>
</div>

<div class="main">

  <div class="topbar">
    <input id="search" class="search" placeholder="Search games..." oninput="renderGames()"/>
  </div>

  <div id="grid" class="grid"></div>

</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content" id="playerContainer">
    <button class="close-btn" onclick="closeGame()">X</button>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
  </div>
</div>

<script>
const games = [
  { name: "Game 1", file: "games/game1.swf", category: "arcade" },
  { name: "Game 2", file: "games/game2.swf", category: "action" },
  { name: "Game 3", file: "games/game3.swf", category: "arcade" }
];

let currentFilter = "all";

/* Render games */
function renderGames() {
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();

  grid.innerHTML = "";

  games
    .filter(g => currentFilter === "all" || g.category === currentFilter)
    .filter(g => g.name.toLowerCase().includes(search))
    .forEach(game => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<h3>${game.name}</h3>`;
      card.onclick = () => openGame(game.file);
      grid.appendChild(card);
    });
}

function filterGames(category) {
  currentFilter = category;
  renderGames();
}

/* Open game */
function openGame(file) {
  const modal = document.getElementById("modal");
  const container = document.getElementById("playerContainer");

  container.innerHTML = `
    <button class="close-btn" onclick="closeGame()">X</button>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
  `;

  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();

  player.style.width = "100%";
  player.style.height = "100%";

  container.appendChild(player);

  player.load(file);

  modal.style.display = "flex";
}

/* Close */
function closeGame() {
  document.getElementById("modal").style.display = "none";
}

/* Fullscreen */
function toggleFullscreen() {
  const el = document.getElementById("playerContainer");

  if (!document.fullscreenElement) {
    el.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* Init */
renderGames();
</script>

</body>
</html>
