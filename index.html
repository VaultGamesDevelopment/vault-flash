<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unblocked Flash Games</title>

  <!-- Ruffle -->
  <script src="ruffle/ruffle.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 15px;
      text-align: center;
      background: #1a1a1a;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    .controls {
      margin: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    select, button {
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    select {
      background: #222;
      color: #fff;
    }

    button {
      background: #4a90e2;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #357bd8;
    }

    .game-container {
      width: 800px;
      max-width: 95%;
      height: 600px;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #333;
      border-radius: 10px;
      overflow: hidden;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

<header>
  🎮 Unblocked Flash Games
</header>

<div class="controls">
  <select id="gameSelect">
    <option value="games/game1.swf">Game 1</option>
    <option value="games/game2.swf">Game 2</option>
    <option value="games/game3.swf">Game 3</option>
  </select>

  <button onclick="loadGame()">Play</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div class="game-container" id="playerContainer">
  <p>Select a game and press Play</p>
</div>

<div class="footer">
  Powered by Ruffle • Flash emulation in browser
</div>

<script>
  let currentPlayer = null;

  function loadGame() {
    const container = document.getElementById("playerContainer");
    container.innerHTML = "";

    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    container.appendChild(player);

    const gameUrl = document.getElementById("gameSelect").value;
    player.load(gameUrl);

    currentPlayer = player;
  }

  function toggleFullscreen() {
    const container = document.getElementById("playerContainer");

    if (!document.fullscreenElement) {
      container.requestFullscreen().catch(err => {
        alert(`Fullscreen error: ${err.message}`);
      });
    } else {
      document.exitFullscreen();
    }
  }
</script>

</body>
</html>
