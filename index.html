<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="tab-title">The Vault | Flash Archive</title>

<!-- Ruffle CDN -->
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #050505;
    --text-color: #ffffff;
    --accent-color: #3b82f6;
    --card-bg: #0f0f0f;
    --border-color: #262626;
    --nav-bg: rgba(5, 5, 5, 0.8);
    --secondary-text: #a3a3a3;
    --glass: rgba(255,255,255,0.03);
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    display: flex;
    align-items: center;
    padding: 15px 5%;
    background: var(--nav-bg);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color);
}

.logo {
    font-weight: 800;
    cursor: pointer;
    margin-right: 20px;
}

nav {
    display: flex;
    gap: 15px;
}

nav a {
    cursor: pointer;
    color: var(--secondary-text);
}

nav a.active {
    color: var(--text-color);
}

.search-container {
    margin-left: auto;
}

#game-search {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    background: var(--glass);
    color: white;
}

/* VIEWS */
.view-section {
    display: none;
    padding: 30px 5%;
}

.view-section.active {
    display: block;
}

/* GRID */
.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
}

.game-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    cursor: pointer;
    overflow: hidden;
    transition: 0.2s;
}

.game-card:hover {
    border-color: var(--accent-color);
    transform: translateY(-4px);
}

.game-card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.game-info {
    padding: 10px;
    text-align: center;
}

/* GAME VIEW */
#game-view {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
    z-index: 2000;
}

#game-container {
    width: 100%;
    height: 100%;
}

.exit-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 2100;
    padding: 10px;
    background: var(--accent-color);
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
}

/* SETTINGS */
#settings-modal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--card-bg);
    padding: 30px;
    border-radius: 16px;
    z-index: 3000;
}

.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 2999;
}

button {
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <div class="logo" onclick="showView('home')">THE VAULT</div>

    <nav>
        <a id="nav-home" class="active" onclick="showView('home')">Flash</a>
        <a id="nav-archive" onclick="showView('archive')">Archive</a>
    </nav>

    <div class="search-container">
        <input id="game-search" placeholder="Search..." onkeyup="filterGames()">
    </div>

    <button onclick="toggleSettings(true)">Settings</button>
</header>

<!-- FLASH GAMES -->
<section id="view-home" class="view-section active">
    <div class="grid-container" id="flash-grid"></div>
</section>

<!-- ARCHIVE (placeholder) -->
<section id="view-archive" class="view-section">
    <p>Archive section (you can expand this later)</p>
</section>

<!-- GAME VIEW -->
<div id="game-view">
    <button class="exit-btn" onclick="closeGame()">Exit</button>
    <div id="game-container"></div>
</div>

<!-- SETTINGS -->
<div class="modal-overlay" id="overlay" onclick="toggleSettings(false)"></div>

<div id="settings-modal">
    <h2>Settings</h2>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('midnight')">Midnight</button>
    <br><br>
    <button onclick="toggleSettings(false)">Close</button>
</div>

<script>
/* GAME DATA */
const games = [
    { name: "Game 1", file: "games/game1.swf", image: "https://via.placeholder.com/300" },
    { name: "Game 2", file: "games/game2.swf", image: "https://via.placeholder.com/300" }
];

/* NAV */
function showView(v) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');

    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    document.getElementById('nav-' + v).classList.add('active');
}

/* LOAD GAMES */
function loadGames() {
    const grid = document.getElementById('flash-grid');

    games.forEach(g => {
        const card = document.createElement('div');
        card.className = "game-card";
        card.setAttribute("data-title", g.name.toLowerCase());

        card.innerHTML = `
            <img src="${g.image}">
            <div class="game-info"><h3>${g.name}</h3></div>
        `;

        card.onclick = () => launchGame(g.file);
        grid.appendChild(card);
    });
}

/* LAUNCH RUFFLE GAME */
function launchGame(file) {
    const container = document.getElementById('game-container');
    container.innerHTML = "";

    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    container.appendChild(player);
    player.load(file);

    document.getElementById('game-view').style.display = 'block';
}

function closeGame() {
    document.getElementById('game-view').style.display = 'none';
    document.getElementById('game-container').innerHTML = "";
}

/* SEARCH */
function filterGames() {
    const q = document.getElementById('game-search').value.toLowerCase();
    document.querySelectorAll('.game-card').forEach(c => {
        c.style.display = c.getAttribute('data-title').includes(q) ? "block" : "none";
    });
}

/* SETTINGS */
function toggleSettings(show) {
    document.getElementById('settings-modal').style.display = show ? 'block' : 'none';
    document.getElementById('overlay').style.display = show ? 'block' : 'none';
}

function setTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
}

/* INIT */
window.onload = () => {
    loadGames();
};
</script>

</body>
</html>
